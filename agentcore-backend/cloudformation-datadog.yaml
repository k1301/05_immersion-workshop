AWSTemplateFormatVersion: '2010-09-09'
Description: 'Datadog LLM Observability - ECS Task Definition Update'

Parameters:
  InfraStackName:
    Type: String
    Description: AgentCore 자식 스택 이름 (Export 참조용)

  ContainerImage:
    Type: String
    Description: ECR image URI

  BedrockModelId:
    Type: String
    Default: ''
    Description: Bedrock model ID

  GatewayMcpUrl:
    Type: String
    Default: ''
    Description: AgentCore Gateway MCP URL

  HelpdeskApiUrl:
    Type: String
    Default: ''
    Description: Helpdesk API URL

  ECSTaskExecutionRoleArn:
    Type: String
    Description: ECS Task Execution Role ARN

  ECSTaskRoleArn:
    Type: String
    Description: ECS Task Role ARN

  KnowledgeBaseId:
    Type: String
    Description: Bedrock Knowledge Base ID

  LogGroupName:
    Type: String
    Description: CloudWatch Log Group Name

  DatadogApiKey:
    Type: String
    NoEcho: true
    Description: Datadog API Key

  DatadogSite:
    Type: String
    Default: 'datadoghq.com'
    Description: Datadog site

  DatadogMlApp:
    Type: String
    Default: 'agentcore-backend'
    Description: DD_LLMOBS_ML_APP

Resources:
  DatadogTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: agentcore-backend-datadog
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn: !Ref ECSTaskExecutionRoleArn
      TaskRoleArn: !Ref ECSTaskRoleArn
      ContainerDefinitions:
        - Name: agent-backend
          Image: !Ref ContainerImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: PYTHONUNBUFFERED
              Value: '1'
            - Name: AWS_REGION
              Value: !Ref 'AWS::Region'
            - Name: AWS_DEFAULT_REGION
              Value: !Ref 'AWS::Region'
            - Name: BEDROCK_MODEL_ID
              Value: !Ref BedrockModelId
            - Name: BEDROCK_KB_ID
              Value: !Ref KnowledgeBaseId
            - Name: GATEWAY_MCP_URL
              Value: !Ref GatewayMcpUrl
            - Name: HELPDESK_API_URL
              Value: !Ref HelpdeskApiUrl
            # ===== Datadog LLM Observability =====
            - Name: DD_API_KEY
              Value: !Ref DatadogApiKey
            - Name: DD_SITE
              Value: !Ref DatadogSite
            - Name: DD_SERVICE
              Value: agentcore-backend
            - Name: DD_ENV
              Value: workshop
            - Name: DD_TRACE_ENABLED
              Value: 'true'
            - Name: DD_LOGS_INJECTION
              Value: 'true'
            - Name: DD_LLMOBS_ENABLED
              Value: '1'
            - Name: DD_LLMOBS_ML_APP
              Value: !Ref DatadogMlApp
            - Name: DD_LLMOBS_AGENTLESS_ENABLED
              Value: '1'
            - Name: DD_PATCH_MODULES
              Value: 'langchain:true,botocore:true'
            - Name: WORKSHOP_SCENARIO
              Value: 'normal'
            - Name: BEDROCK_MAX_TOKENS
              Value: '4096'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroupName
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8000/ || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

Outputs:
  DatadogTaskDefinitionArn:
    Description: Datadog Task Definition ARN
    Value: !Ref DatadogTaskDefinition
