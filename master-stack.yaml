AWSTemplateFormatVersion: '2010-09-09'
Description: 'Master Stack - VPC + IT Helpdesk API + AgentCore Backend Full Infrastructure'

Parameters:
  EnvironmentName:
    Type: String
    Default: agentcore
    Description: 리소스 네이밍 프리픽스

  VpcCIDR:
    Type: String
    Default: 10.0.0.0/16

  PublicSubnet1CIDR:
    Type: String
    Default: 10.0.1.0/24

  PublicSubnet2CIDR:
    Type: String
    Default: 10.0.2.0/24

  TemplateBucketName:
    Type: String
    Description: 자식 템플릿이 업로드된 S3 버킷 이름

  HelpdeskContainerImage:
    Type: String
    Default: ''
    Description: Helpdesk API ECR 이미지 URI

  AgentcoreContainerImage:
    Type: String
    Default: ''
    Description: AgentCore Backend ECR 이미지 URI

  HelpdeskDesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10

  AgentcoreDesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10

  BedrockModelId:
    Type: String
    Default: 'us.anthropic.claude-sonnet-4-5-20250929-v1:0'

  GatewayMcpUrl:
    Type: String
    Default: ''

  HelpdeskApiUrl:
    Type: String
    Default: ''

Resources:
  # ==================== VPC 네트워크 ====================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-vpc'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-igw'

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnet1CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-1'

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [1, !GetAZs '']
      CidrBlock: !Ref PublicSubnet2CIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-2'

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-public-rt'

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RTAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ==================== Nested Stack: IT Helpdesk API ====================
  HelpdeskStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - PublicSubnet1RTAssoc
      - PublicSubnet2RTAssoc
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucketName}.s3.amazonaws.com/nested/it-helpdesk-api.yaml'
      Parameters:
        VpcId: !Ref VPC
        PublicSubnet1: !Ref PublicSubnet1
        PublicSubnet2: !Ref PublicSubnet2
        ContainerImage: !Ref HelpdeskContainerImage
        DesiredCount: !Ref HelpdeskDesiredCount
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-helpdesk'

  # ==================== Nested Stack: AgentCore Backend ====================
  AgentcoreStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - PublicSubnet1RTAssoc
      - PublicSubnet2RTAssoc
    Properties:
      TemplateURL: !Sub 'https://${TemplateBucketName}.s3.amazonaws.com/nested/agentcore-backend.yaml'
      Parameters:
        VpcId: !Ref VPC
        PublicSubnet1: !Ref PublicSubnet1
        PublicSubnet2: !Ref PublicSubnet2
        ContainerImage: !Ref AgentcoreContainerImage
        DesiredCount: !Ref AgentcoreDesiredCount
        BedrockModelId: !Ref BedrockModelId
        GatewayMcpUrl: !Ref GatewayMcpUrl
        HelpdeskApiUrl: !Ref HelpdeskApiUrl
      Tags:
        - Key: Name
          Value: !Sub '${EnvironmentName}-agentcore'

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  PublicSubnet1Id:
    Description: Public Subnet 1
    Value: !Ref PublicSubnet1

  PublicSubnet2Id:
    Description: Public Subnet 2
    Value: !Ref PublicSubnet2

  HelpdeskALBURL:
    Description: Helpdesk API ALB URL
    Value: !GetAtt HelpdeskStack.Outputs.ALBURL

  HelpdeskCloudFrontURL:
    Description: Helpdesk API CloudFront URL
    Value: !GetAtt HelpdeskStack.Outputs.CloudFrontURL

  HelpdeskECRUri:
    Description: Helpdesk ECR Repository URI
    Value: !GetAtt HelpdeskStack.Outputs.ECRRepositoryUri

  AgentcoreALBURL:
    Description: AgentCore Backend ALB URL
    Value: !GetAtt AgentcoreStack.Outputs.ALBURL

  AgentcoreCloudFrontURL:
    Description: AgentCore Backend CloudFront URL
    Value: !GetAtt AgentcoreStack.Outputs.CloudFrontURL

  AgentcoreECRUri:
    Description: AgentCore ECR Repository URI
    Value: !GetAtt AgentcoreStack.Outputs.ECRRepositoryUri

  AgentcoreKnowledgeBaseId:
    Description: Bedrock Knowledge Base ID
    Value: !GetAtt AgentcoreStack.Outputs.KnowledgeBaseId
