version: '3.8'

services:
  helpdesk-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: it-helpdesk-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

# 선택사항: 네트워크 정의
networks:
  default:
    name: helpdesk-network
